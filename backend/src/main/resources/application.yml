spring:
  application:
    name: itam-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/itam_db}
    username: ${DB_USERNAME:itam_user}
    password: ${DB_PASSWORD:change_me}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${BACKEND_PORT:8080}
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.company.itam: DEBUG
