spring:
  datasource:
    url: jdbc:tc:postgresql:16:///itam_test?TC_INITSCRIPT=classpath:db/init-test.sql
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

logging:
  level:
    root: WARN
    com.company.itam: DEBUG
